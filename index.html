<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Advanced Sales Analytics Pivot</title>

    <!-- Local CSS Libraries -->
    <link rel="stylesheet" type="text/css" href="libs/css/pivot.min.css">
    <link rel="stylesheet" href="libs/css/inter.css">

    <!-- Application CSS -->
    <link rel="stylesheet" href="css/variables.css">
    <link rel="stylesheet" href="css/layout.css">
    <link rel="stylesheet" href="css/pivot.css">
    <link rel="stylesheet" href="css/components.css">

    <!-- Tabulator CSS (must load before custom overrides) -->
    <link href="libs/css/tabulator.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/tabulator-custom.css">
</head>
<body>

    <div class="content-area">

        <div class="upload-header">
            <div class="upload-header-top">
                <div class="upload-header-text">
                    <h2>
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" width="22" height="22"><polygon points="22 3 2 3 10 12.46 10 19 14 21 14 12.46 22 3"></polygon></svg>
                        Interactive Data Engine
                    </h2>
                    <div class="status" id="data-status">
                        <span class="status-dot"></span>
                        <span>Please upload a CSV file to begin</span>
                    </div>
                </div>
                <div>
                    <input type="file" id="csv-file-input" accept=".csv" style="display: none;">
                    <button class="btn-upload" id="btn-import-csv">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="17 8 12 3 7 8"></polyline><line x1="12" y1="3" x2="12" y2="15"></line></svg>
                        Upload CSV File
                    </button>
                    <button class="btn-upload btn-secondary" id="btn-load-sample">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline><line x1="16" y1="13" x2="8" y2="13"></line><line x1="16" y1="17" x2="8" y2="17"></line></svg>
                        Load Sample Data
                    </button>
                </div>
            </div>
            <div class="upload-header-toolbar" id="header-toolbar">
                <span id="renderer-host"></span>
                <button class="btn-upload btn-secondary" id="btn-toggle-view">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><line x1="3" y1="9" x2="21" y2="9"></line><line x1="9" y1="21" x2="9" y2="9"></line></svg>
                    <span>View Raw Data</span>
                </button>
                <button class="btn-upload btn-secondary" id="btn-toggle-ui">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>
                    <span>Hide UI</span>
                </button>
                <div style="width: 1px; height: 20px; background: var(--pvt-dropzone-border); opacity: 0.5; margin: 0 0.125rem;"></div>
                <button class="btn-upload btn-secondary" id="btn-export-png">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><circle cx="8.5" cy="8.5" r="1.5"></circle><polyline points="21 15 16 10 5 21"></polyline></svg>
                    Export Chart
                </button>
                <button class="btn-upload btn-secondary" id="btn-export-csv">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></svg>
                    Export to CSV
                </button>
                <div class="raw-data-controls" style="display: none;">
                    <div style="width: 1px; height: 20px; background: var(--pvt-dropzone-border); opacity: 0.5; margin: 0 0.125rem;"></div>
                    <div class="col-toggle-wrapper">
                        <button class="btn-upload btn-secondary" id="btn-columns">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M12 3h7a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-7m0-18H5a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h7m0-18v18"></path></svg>
                            Columns
                        </button>
                        <div class="col-toggle-dropdown" id="col-dropdown" style="display: none;"></div>
                    </div>
                    <input type="text" id="raw-search" class="raw-search-input" placeholder="Search all columns...">
                </div>
            </div>
        </div>

        <!-- PivotTable.js Output -->
        <div id="pivot-table-output"></div>
        <!-- Tabulator Long Table Output -->
        <div id="long-table-output" style="display: none; margin-top: 1rem;"></div>
    </div>

    <!-- Local JavaScript Libraries -->
    <script src="libs/js/jquery.min.js"></script>
    <script src="libs/js/jquery-ui.min.js"></script>
    <script src="libs/js/plotly.min.js"></script>
    <script src="libs/js/papaparse.min.js"></script>
    <script src="libs/js/pivot.min.js"></script>
    <script src="libs/js/plotly_renderers.min.js"></script>
    <script src="libs/js/tabulator.min.js"></script>

    <!-- Application JavaScript (load order matters) -->
    <script src="js/config.js"></script>
    <script src="js/column-analysis.js"></script>
    <script src="js/data-cleaning.js"></script>
    <script src="js/pivot-renderer.js"></script>
    <script src="js/csv-handler.js"></script>
    <script src="js/export-handler.js"></script>
    <script src="js/raw-data-view.js"></script>
    <script src="js/ui-controls.js"></script>
</body>
</html>
